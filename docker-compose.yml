services:
  botify:
    build: .
    container_name: botify
    restart: unless-stopped
    env_file: .env
    environment:
      - BOTIFY_DATABASE_URL=sqlite:////data/botify.db
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
